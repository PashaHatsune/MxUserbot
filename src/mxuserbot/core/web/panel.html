<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MXUserbot | Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .view { animation: fade 0.2s ease-out; }
        @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #2d2d35; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#0b0b0f] text-[#ececed] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[650px] bg-[#16161a] border border-[#2d2d35] rounded-xl p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-[#2d2d35] pb-4">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                MXUserbot <span class="h-2 w-2 rounded-full bg-[#ffb2ef] animate-pulse"></span>
            </h1>
            <div class="flex gap-1 bg-black p-1 rounded-lg border border-[#2d2d35]">
                <button onclick="nav('dash')" id="b-dash" class="px-3 py-1 bg-[#2d2d35] text-white rounded text-xs font-semibold">Dash</button>
                <button onclick="nav('mods')" id="b-mods" class="px-3 py-1 text-[#94949e] hover:text-white rounded text-xs font-semibold transition">Mods</button>
                <button onclick="nav('set')" id="b-set" class="px-3 py-1 text-[#94949e] hover:text-white rounded text-xs font-semibold transition">Settings</button>
            </div>
        </div>

        <div id="v-dash" class="view">
            <div class="grid grid-cols-3 gap-3 mb-5">
                <div class="bg-black border border-[#2d2d35] rounded p-3 text-center"><p class="text-[#94949e] text-[10px] mb-1">Status</p><p class="text-[#ffb2ef] font-bold">ONLINE</p></div>
                <div class="bg-black border border-[#2d2d35] rounded p-3 text-center"><p class="text-[#94949e] text-[10px] mb-1">Modules</p><p id="m-count" class="text-white font-bold">--</p></div>
                <div class="bg-black border border-[#2d2d35] rounded p-3 text-center"><p class="text-[#94949e] text-[10px] mb-1">API</p><p class="text-green-400 font-bold">Stable</p></div>
            </div>
            <div class="bg-black border border-[#2d2d35] rounded p-3 font-mono text-[11px] text-[#94949e] h-32 overflow-y-auto space-y-1">
                <p><span class="text-[#ffb2ef]">[INFO]</span> Panel initialized.</p>
                <p><span class="text-green-400">[SYS]</span> Connected to API.</p>
            </div>
        </div>

        <div id="v-mods" class="view hidden">
            <input id="search" type="text" placeholder="Search community modules..." class="w-full p-2.5 mb-3 bg-black border border-[#2d2d35] rounded-lg text-sm text-white focus:border-[#ffb2ef] outline-none">
            <div id="mod-list" class="space-y-2 max-h-[280px] overflow-y-auto pr-1"></div>
        </div>

        <div id="v-set" class="view hidden">
            <label class="block text-[11px] font-bold text-[#94949e] mb-2 uppercase">Command Prefix</label>
            <div class="flex gap-2 mb-6">
                <input id="in-prefix" type="text" placeholder="." maxlength="3" class="w-20 p-2.5 bg-black border border-[#2d2d35] rounded-lg text-sm text-center text-white focus:border-[#ffb2ef] outline-none">
                <button onclick="chPrefix()" id="btn-prefix" class="px-5 bg-[#2d2d35] text-white rounded-lg text-sm font-bold hover:bg-[#3f3f4a] transition w-full">Save Prefix</button>
            </div>

            <label class="block text-[11px] font-bold text-[#94949e] mb-2 uppercase">Repositories</label>
            <div id="repo-list" class="space-y-2 mb-4 max-h-32 overflow-y-auto pr-1"></div>
            <div class="flex gap-2 mb-2">
                <input id="r-url" type="text" placeholder="https://github.com/..." class="w-full p-2.5 bg-black border border-[#2d2d35] rounded-lg text-sm text-white focus:border-[#ffb2ef] outline-none">
                <button onclick="actRepo('POST')" class="px-5 bg-[#2d2d35] text-white rounded-lg text-sm font-bold hover:bg-[#3f3f4a]">Add</button>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const pMods =['help', 'loader', 'v', 'set_prefix', 'config'];
        let mIds = [], lastRes =[], to;

        const api = async (p, m = 'GET', b = null) => {
            const res = await fetch('/api' + p, { method: m, headers: b ? { 'Content-Type': 'application/json' } : {}, body: b ? JSON.stringify(b) : null });
            const d = await res.json();
            if (!res.ok) throw new Error(typeof d.detail === 'object' ? JSON.stringify(d.detail) : d.detail);
            return d;
        };

        const nav = t => {
            ['dash', 'mods', 'set'].forEach(x => {
                $('v-' + x).classList.toggle('hidden', x !== t);
                $('b-' + x).className = `px-3 py-1 rounded text-xs font-semibold transition ${x === t ? 'bg-[#2d2d35] text-white' : 'text-[#94949e] hover:text-white'}`;
            });
            if (t === 'mods') { $('search').value = ''; loadMods(); }
            if (t === 'set') loadRepos();
        };

        const getIds = async () => { mIds = (await api('/modules/active')).modules ||[]; $('m-count').innerText = mIds.length; };
        const loadMods = async () => { try { await getIds(); renderMods(mIds.map(m => ({ id: m, name: m, local: true }))); } catch (e) {} };

        const renderMods = items => {
            $('mod-list').innerHTML = items.length ? items.map(m => {
                const inst = mIds.includes(m.id), prot = pMods.includes(m.id);
                const type = (m.local && prot) || m.is_core ? 'CORE' : m.local ? 'LOCAL' : 'COMMUNITY';
                const bStyle = type === 'CORE' ? 'bg-[#ffb2ef]/20 text-[#ffb2ef]' : 'bg-[#2d2d35] text-[#94949e]';
                
                const btn = (prot && inst) ? 
                    `<button disabled class="px-3 py-1.5 rounded text-[10px] font-bold min-w-[90px] bg-[#2d2d35] text-[#555] cursor-not-allowed">SYSTEM</button>` :
                    `<button onclick="actMod('${m.tgt || m.id}', '${m.id}', ${!inst}, this)" class="px-3 py-1.5 rounded text-[10px] font-bold min-w-[90px] transition-all ${inst ? 'border border-[#2d2d35] text-[#f87171] hover:bg-[#f87171]/10' : 'bg-[#ffb2ef] text-black hover:opacity-90'}">${inst ? 'UNINSTALL' : 'INSTALL'}</button>`;

                return `<div class="flex justify-between items-center p-3 border border-[#2d2d35] rounded-lg bg-black/40"><div class="truncate pr-3 text-left"><h3 class="text-white text-sm font-semibold truncate flex items-center gap-2">${m.name} <span class="${bStyle} text-[9px] px-1.5 py-0.5 rounded font-bold">${type}</span></h3><p class="text-[11px] text-[#94949e] truncate mt-0.5">${m.desc || 'Module plugin'}</p></div>${btn}</div>`;
            }).join('') : '<p class="text-center text-[#94949e] text-sm mt-4">No modules found.</p>';
        };

        const actMod = async (tgt, id, isInst, btn) => {
            const old = btn.innerText; btn.innerText = '...';
            try {
                await api(isInst ? '/modules/install' : '/modules/uninstall', 'POST', isInst ? { target: tgt, is_dev: false } : { name: id });
                await getIds();
                $('search').value.trim() && lastRes.length ? renderMods(lastRes) : await loadMods();
            } catch (e) { alert("Error: " + e.message); btn.innerText = old; }
        };

        const doSearch = async q => {
            if (!q) { lastRes =[]; return loadMods(); }
            $('mod-list').innerHTML = '<p class="text-center text-[#94949e] mt-4 animate-pulse">Searching...</p>';
            try {
                lastRes = (await api('/modules/search?query=' + encodeURIComponent(q))).data.flatMap(r => 
                    r.modules.map(m => ({ ...m, tgt: (r.is_system ? "" : (r.url.includes('raw') ? r.url.split('/')[3]+'/' : 'community/')) + m.id, desc: m.description, local: false, is_core: r.is_system }))
                );
                renderMods(lastRes);
            } catch (e) { $('mod-list').innerHTML = `<p class="text-center text-[#f87171] text-sm">${e.message}</p>`; }
        };

        $('search').oninput = e => { clearTimeout(to); to = setTimeout(() => doSearch(e.target.value.trim()), 500); };

        const loadRepos = async () => {
            try {
                const r = await api('/repos');
                $('repo-list').innerHTML = `<div class="flex justify-between p-2.5 bg-black border border-[#2d2d35] rounded-lg"><span class="text-xs text-white truncate"><span class="text-[#ffb2ef]">★</span> System Repository</span><span class="text-[9px] bg-[#ffb2ef]/20 text-[#ffb2ef] px-1.5 py-0.5 rounded font-bold">CORE</span></div>` +
                    r.community_repos.map(u => `<div class="flex justify-between items-center p-2.5 bg-black border border-[#2d2d35] rounded-lg mt-1"><span class="text-xs text-[#94949e] truncate pr-2">${u}</span><button onclick="actRepo('DELETE', '${u}')" class="text-[#f87171] text-[10px] font-bold hover:underline">DEL</button></div>`).join('');
            } catch (e) {}
        };

        const actRepo = async (m, u) => {
            const url = u || $('r-url').value.trim(); if (!url) return;
            try { await api('/repos', m, { url }); $('r-url').value = ''; loadRepos(); } catch (e) { alert(e.message); }
        };

        const chPrefix = async () => {
            const p = $('in-prefix').value.trim(), btn = $('btn-prefix'), old = btn.innerText;
            if (!p) return; btn.innerText = 'Saving...';
            try { await api('/config/prefix', 'POST', { prefix: p }); alert('Saved: ' + p); $('in-prefix').value = ''; } 
            catch (e) { alert('Error: ' + e.message); } finally { btn.innerText = old; }
        };

        window.onload = () => { $('search').value = ''; loadMods(); };
    </script>
</body>
</html>
